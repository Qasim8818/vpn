# Bird2 BGP Configuration with RPKI Validation
# Section 18: Infrastructure — Secure BGP Routing
#
# This configuration:
# 1. Enables BGP to announce VPN server endpoints
# 2. Validates announcements against RPKI certificates
# 3. Rejects invalid/hijacked routes
#
# Deploy on: VPN gateway router
# Build: bird2 (install via apt/yum)
# Test: birdc show route all

# ============================================
# 1. Global Configuration
# ============================================

router id 203.0.113.1;  # VPN Gateway Router ID

log syslog all;
log "/var/log/bird/bird.log" all;

debug protocols all;

# ============================================
# 2. Kernel & Device Configuration
# ============================================

protocol kernel {
    allow read;
    allow write;
    ipv4 {
        import all;
        export all;
    };
}

protocol device {
    scan time 10;
}

# ============================================
# 3. Static Routes (VPN Server Announcements)
# ============================================

protocol static static4 {
    ipv4;
    
    # VPN server subnet to announce
    # These are the IP ranges we operate VPN services from
    route 203.0.113.0/24 via "eth0";
    route 198.51.100.0/24 via "eth0";
    route 192.0.2.0/24 via "eth0";
    
    # Per-server endpoints
    route 203.0.113.10/32 via "eth0";      # Primary VPN gateway 1
    route 203.0.113.11/32 via "eth0";      # Primary VPN gateway 2
    route 198.51.100.20/32 via "eth0";     # Backup VPN gateway
}

# ============================================
# 4. RPKI Configuration
# ============================================

# RPKI Cache Validator
# Alice's Internet Routing Integrity Policy (ARIN RPKI)
# Data: https://rpki.arin.net
protocol rpki {
    roa4 table rpki4;
    roa6 table rpki6;
    
    # RPKI cache servers (public)
    remote "rpki.arin.net" {
        port 323;
    };
    
    # Backup cache (APNIC)
    remote "rpki.apnic.net" {
        port 323;
    };
    
    # Local fallback (if you run your own RPKI validator)
    # remote 127.0.0.1 {
    #     port 3323;
    #     transport ssh {
    #         user "bird";
    #         key "/etc/bird/ssh_keys/rpki_key";
    #     };
    # };
    
    # Refresh frequency for RPKI data
    refresh time 3600;         # Update every hour
    expire time 172800;        # Expire if unreachable for 48h
    
    # Validation timings
    timeout 10;
    retry time 600;
}

# ============================================
# 5. Route Filtering (RPKI Validation)
# ============================================

filter rpki_check {
    # Import filter: validate announcements against RPKI
    
    # If origin AS is unknown to RPKI: INVALID (reject)
    # If prefix is covered by RPKI ROA with matching ASN: VALID (accept)
    # If prefix is NOT covered by any ROA: UNKNOWN (warn but accept)
    
    if (roa_check(rpki4, net, bgp_path.last) = ROA_VALID) then {
        print "RPKI Valid: ", net, " from AS", bgp_path.last;
        accept;
    }
    
    if (roa_check(rpki4, net, bgp_path.last) = ROA_INVALID) then {
        # INVALID: this prefix is certified for a different ASN
        # Likely a hijack or misconfiguration
        print "RPKI REJECT: Invalid route ", net, " from AS", bgp_path.last;
        reject;
    }
    
    if (roa_check(rpki4, net, bgp_path.last) = ROA_UNKNOWN) then {
        # UNKNOWN: no RPKI data covers this prefix
        # Could be legacy route or misconfiguration
        # Policy: warn but accept (RPKI not 100% coverage yet)
        print "RPKI UNKNOWN: Uncovered route ", net, " from AS", bgp_path.last;
        accept;
    }
}

# ============================================
# 6. BGP Configuration (Upstream Peers)
# ============================================

protocol bgp upstream1 {
    local as 65000;         # Our ASN
    neighbor 203.0.113.254 as 65001;  # Upstream ISP
    
    ipv4 {
        # Import routes from upstream
        import filter {
            # Receive routes from upstream, but only valid ones
            acceptance = roa_check(rpki4, net, bgp_path.last);
            
            print "Upstream route: ", net, " from AS", bgp_path.last, " - ", acceptance;
            
            # Only accept valid or unknown
            if (acceptance != ROA_INVALID) then accept;
            else reject;
        };
        
        # Export: advertise our routes
        export filter {
            # Only announce our own routes
            if (source ~ [ RTC_STATIC ]) then accept;
            else reject;
        };
    };
    
    direct;
    gateway direct;
    source address 203.0.113.1;
}

protocol bgp upstream2 {
    local as 65000;
    neighbor 198.51.100.254 as 65002;
    
    ipv4 {
        import filter rpki_check;
        export filter {
            if (source ~ [ RTC_STATIC ]) then accept;
            else reject;
        };
    };
    
    direct;
    gateway direct;
    source address 203.0.113.1;
}

# ============================================
# 7. RPKI-based Route Filtering
# ============================================

# Reject routes not certified in RPKI
filter accept_valid_only {
    if (roa_check(rpki4, net, bgp_path.last) = ROA_VALID) then accept;
    if (roa_check(rpki4, net, bgp_path.last) = ROA_INVALID) then reject;
    # ROA_UNKNOWN: accept (coverage gap)
    accept;
}

# ============================================
# 8. VPN-specific Export Filters
# ============================================

filter export_vpn_routes {
    # We announce these VPN server IPs:
    # Only export if route is in our static table and valid
    
    if net in 203.0.113.0/24 then {
        # Our VPN subnet, advertise to all peers
        bgp_local_pref = 200;  # High priority
        bgp_path.prepend(65000, 65000);  # Extra prepend = less attractive elsewhere
        accept;
    };
    
    if net in 198.51.100.0/24 then {
        # Backup VPN subnet
        bgp_local_pref = 100;  # Lower priority
        bgp_path.prepend(65000);
        accept;
    };
    
    # Don't advertise anything else
    reject;
}

# ============================================
# 9. Monitoring & Logging
# ============================================

# Log RPKI state changes
protocol rpki {
    debug "events";
}

# Record all route changes
filter log_routes {
    if (net.len > 24) then {
        # Too specific (might be attack)
        print time, " SUSPICIOUS ROUTE: ", net, " from ", bgp_path.last;
    }
    
    print time, " Route update: ", net, " via AS", bgp_path.last;
    accept;
}

# ============================================
# 10. Secondary: IPv6 Configuration
# ============================================

protocol static static6 {
    ipv6;
    
    # IPv6 VPN endpoints (optional)
    # route 2001:db8::/32 via "eth0";
}

# IPv6 BGP would be similar:
# protocol bgp upstream1_v6 { ... ipv6 { ... } ... }

# ============================================
# OUTPUT: Route Validation Examples
# ============================================

# When bird starts, it:
# 1. Downloads RPKI ROAs from cache (set of "prefix ASN is valid")
# 2. Receives BGP announcements
# 3. Checks each: roa_check(rpki4, prefix, announced_asn)
# 4. Result:
#    ROA_VALID: prefix is in database, matches announced ASN ✓
#    ROA_INVALID: prefix exists, but different ASN was certified  ✗
#    ROA_UNKNOWN: no data for this prefix (acceptance gap)  ⚠

# Example RPKI ROA table (from ARIN):
# 203.0.113.0/24 AS65000  ← Our VPN subnet is certified
# 203.0.113.10/32 AS65000 ← Specific server IP is certified

# If someone announces 203.0.113.0/24 as AS65999:
#   roa_check() returns ROA_INVALID
#   Bird rejects the route (prevents hijack)
#   Our VPN servers remain reachable via correct AS

# ============================================
# DEPLOYMENT CHECKLIST
# ============================================
# 
# [ ] Install bird2 package
# [ ] Download RPKI certificate (ARIN/APNIC/RIPE)
# [ ] Configure ASN and router ID
# [ ] Set up RPKI cache server (public or private)
# [ ] Define static routes for VPN subnets
# [ ] Create ROAs: publish "these IP ranges are ours"
# [ ] Test: birdc show route gives correct next hops
# [ ] Monitor: check for invalid routes (attempted hijacks)
# [ ] Alert: on ROA_INVALID route (hijack alert)
# [ ] Failover: if RPKI cache unreachable, graceful degradation
#
# Expected behavior:
#   - RPKI Valid routes: advertised and accepted ✓
#   - RPKI Invalid (hijack attempts): rejected ✗
#   - RPKI Unknown (legacy): accepted with warning ⚠
#
